/*

Specifically though, this plugin wants the global and classnamed sections in a SPECIFIC format.
Under those, the repeat and dice should ALWAYS exist. IF you dont want any roll, set the REPEAT to 0.
If REPEAT is 0 then the child things group can be omitted. things_no_roll group is always optional.

The types of sections you can define that are triggered when a player dies is:

Class Type of the thing that died:
smoker
hunter
charger
boomer
spitter
jockey
witch
tank
infected 			- This is the common infected

Special Categories
global 				- Anytime anything dies
normal_infected		- Any of the normal infected classes: smoker, hunter, charger, boomer, spitter, jockey
boss_infected		- Any of the boss classes: tank, witch


Inside the sections, you define what can be spawned\created. This plugin is essentially a wrapper for the z_spawn command, 
and creating entities. You just control what is created or called, and when it happens. Each "thing" that can be generated 
fits into one of five thing types:
	item		Create a specific entity. These are entities that don't require any other changes to configure. While
				this system allows you to create weapons, the thing type "weapon" should be used for that because more
				control is given. The same for upgrades, use the thing type "upgrade". However, the thing type "item" 
				should be used for grenades and items:
				
				Items:
				weapon_first_aid_kit_spawn
				weapon_pain_pills_spawn
				weapon_adrenaline_spawn
				weapon_defibrillator_spawn
				
				Special Weapons
				weapon_chainsaw_spawn
				weapon_grenade_launcher_spawn
				
				Specific Weapons - Better to use thing type "weapon":
				weapon_pistol_spawn					weapon_pistol_magnum_spawn
				weapon_smg_spawn					weapon_pumpshotgun_spawn
				weapon_autoshotgun_spawn			weapon_rifle_spawn
				weapon_hunting_rifle_spawn			weapon_smg_silenced_spawn
				weapon_shotgun_chrome_spawn			weapon_rifle_desert_spawn
				weapon_shotgun_spas_spawn			weapon_rifle_ak47_spawn
				weapon_sniper_military_spawn
				
				Upgrades - Better to use thing type "upgrade":
				weapon_upgradepack_incendiary_spawn
				weapon_upgradepack_explosive_spawn
					
	infected	Generates infected bots, calls hordes or mobs. This is any standard z_spawn command parameter. However, z_spawn parameters 
				should always have _ characters in place of spaces. To prevent spawned infected from appear either very very far away
				or right next to the players, you'll want 'auto' them.
				Example: boomer_auto

				Remember, NO SPACES, use _.

				z_spawn Parameters:
				panic: Creates a panic event (like at a crecendo)
				mob: Creates a mob off screen that runs at the players
				boomer: Creates a boomer infected
				smoker: Creates a smoker infected
				spitter: Creates a spitter infected
				jockey: Creates a jockey infected
				hunter: Creates a hunter infected
				charger: Creates a charger infected
				tank: Creates a tank boss, players should take control of it.
				witch: Creates a witch boss
				
				Special Values:
				infected-team: Creates one of every standard infected class (jockey, charger etc)
				boss-team: Creates a tank and witch with auto paramaeter.
				mob-[type]: Generates a mob using the L4D2 Spawn Uncommons plugin (if available)
						Where [type] is one of the following:
							riot	- Riot guard
							ceda	- Ceda agent
							clown	- Big foot clown!
							mud		- Mud men
							roadcrew - construction workers
							jimmy	- Jimmy gibbs!
							fallen	- Fallen survivors
							random	- random uncommon infected
						Example: mob-random
						  
	weapon		Generates a weapon. This uses the weapon_spawn entity which allows greater control over weapon spawning than the specific
				weapon entity 
				
				Specific Weapons:
				weapon_pistol		- Pistol
				weapon_pistol_magnum	- Magnum Pistol
				weapon_smg		- SMG
				weapon_smg_silenced	- Silenced SMG
				weapon_pumpshotgun	- Pump Shotgun
				weapon_shotgun_chrome	- Chrome Shotgun
				weapon_autoshotgun	- Auto Shotgun
				weapon_shotgun_spas	- SPAS Shotgun
				weapon_rifle		- M4 Rifle
				weapon_rifle_desert	- Desert Rifle
				weapon_rifle_ak47	- AK47
				weapon_hunting_rifle	- Hunting Rifle
				weapon_sniper_military	- Sniper Military


				Throwables:
				weapon_molotov		- Molotov Cocktail
				weapon_pipebomb		- Pipebomb
				weapon_vomitjar		- The bile bomb
				weapon_fireworkcrate	- Crate of fireworks
				weapon_propanetank	- Propane tank
				weapon_gascan		- Gas can

				
				Categorized Weapons:
				any 				- Any primary or secondary weapon
				any_pistol 			- Any Pistol
				any_primary 			- Any Primary Weapon
				tier1_any 			- Any tier 1 primary
				tier2_any 			- Any tier 2 primary
				any_smg 			- Any tier 1 SMG
				any_rifle 			- Any tier 2 Rifle
				any_sniper_rifle 		- Any tier 2 Sniper Rifle
				any_shotgun 			- Any Shotgun
				tier1_shotgun 			- Any tier 1 Shotgun
				tier2_shotgun 			- Any tier 2 Shotgun		
				
	upgrade		Spawns specific upgrades, or randomly chooses from the specified types. You can specify a single upgrade, or make a combination
				by seperating with the - character. Do not include spaces or special characters.
				
				Upgrades:
				laser
				incendiary
				explosive
				
				Single Example: explosive
				Two Example: laser-incendiary
				All Example: laser-explosive-incendiary
	
	melee		Spawns melee weapons. This can be specific melee weapons, or use the value "any" to have the director randomly choose.
				
				Melee Weapons:
				baseball_bat	cricket_bat
				crowbar			electric_guitar
				fireaxe			frying_pan
				katana			machete
				tonfa
				knife *Untested
				riotshield *Untested

*/

// Defines how many items of any given type can spawn through the whole map.
max_spawns:
{
	/*
	Define each item and how many times it can appear in the map
	If the value is -1 this will prevent it from being spawned ever. Don't use 0.
	
	The format is the name of the thing type, then the thing name with a value.
	The list of thing types are the large sections above, and the thing names are the
	individual items from that section.
	
	*/
	
	weapon:
	{
		weapon_smg = 5;
		any_pistol = 1;
	};
	
	// Remember, the infected paramaters for z_spawn should contain _ instead of spaces.
	// So an infected item of "charger auto" should be written as "charger_auto"
	infected:
	{
		horde = 1;
	};
	
	item:
	{
		// Defibs only allowed ONCE. This can come from GLOBAL, or if we set up a specific infected to be able to spawn
		// defibs. Either way, once a single defib has been created by this plugin, it won't be allowed anymore.
		weapon_defibrillator_spawn = 1;
	};
};

// Global section is executed anytime ANYTHING dies.
global:
{
	repeat = 1;
	dice = [500];
	
	// Any "section" can have these two lines added. They are optional. If the loot_announce_mode is set to 1 or 2, then 
	// these values displayed to the correct team IF something spawns from "things" or "things_no_roll". If you don't want
	// a specific team to have an announcement for this "section", just delete that teams definition or both. This is handy
	// if you want to announce a horde after witch dies, or if the tank gets killed and drops lots of goodies.
	
	tell_survivors = "You hear something drop to the ground...";
	tell_infected = "You have helped the enemy!";
	
	things = (
	{	name	=	"weapon_defibrillator_spawn";
		type	=	"item";
		min		=	1;
		max		=	10;
	}
	);
};

smoker:
{
	// We're going to do rolls for two seperate spawn sets
	repeat = 2;
	dice = [10];
	
	// Anytime 1-8 is rolled a random tier2 weapon is spawned.
	things = (
	{	name = "tier2_any";
		type = "weapon";
		min  = 1;
		max  = 8;
	}
	);
};

hunter:
{
	// How many spawn sets do we process and roll for individually
	repeat = 1;

	// How many sides to each dice. This is also the count of dice. [10,10,10] would give three 10 sided dice.
	dice = [10,7];
	
	
	things = (
	// Spawn a pipe bomb if 1-3 roll
	{	name	=	"weapon_pipe_bomb_spawn";
		type 	=	"item";
		min		=	1;
		max		=	3;
	},
	// Spawn a shotgun
	{	name	=	"weapon_pumpshotgun";
		type 	=	"weapon";
		min		=	1;
		max		=	10;
	},
	// Spawn a charger if 5 is rolled
	{	name	=	"charger_auto";
		type 	=	"infected";
		min		=	5;
		max		=	5;
	}
	);
};

jockey:
{
	// We set these to defaults of 0 because we're ONLY going to use things_no_roll. You can mix though, have both rolling sets and thigns that always spawn
	repeat = 0;
	dice = [0];
	
	// These will always spawn since they are in the no roll section.
	things_no_roll = (
	{	name	=	"weapon_pumpshotgun";
		type	=	"item";
	},
	{	name	=	"weapon_smg";
		type	=	"item";
	}
	);
};

infected:
{
	repeat = 0;
	dice = [0];
	
	things_no_roll = (
	{	name	=	"weapon_first_aid_kit_spawn";
		type	=	"item";
	}
	);
};









